<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BlissFlow — 文案生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========================================
   BlissFlow Design System v3
   School: Warm Humanist (Stripe Press / Mailchimp early)
   ======================================== */

:root {
  /* === Color: warm tinted neutrals (hue 40) === */
  --bg:          oklch(98.5% 0.004 40);
  --surface:     oklch(96.5% 0.006 40);
  --surface-2:   oklch(93% 0.008 40);
  --border:      oklch(88% 0.01 40);
  --border-hi:   oklch(82% 0.012 40);
  --text:        oklch(20% 0.012 40);
  --text-2:      oklch(42% 0.01 40);
  --text-3:      oklch(58% 0.008 40);

  /* === Brand: warm terracotta === */
  --brand:       oklch(66% 0.14 35);
  --brand-hi:    oklch(72% 0.12 35);
  --brand-lo:    oklch(56% 0.13 35);
  --brand-bg:    oklch(94% 0.025 35);

  /* === Semantic === */
  --ok:          oklch(52% 0.09 140);
  --ok-bg:       oklch(93% 0.02 140);
  --err:         oklch(56% 0.16 25);
  --err-bg:      oklch(93% 0.025 25);

  /* === Typography === */
  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;

  /* === Spacing (4pt base) === */
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px;

  /* === Radius (hierarchical) === */
  --r-input: 4px;
  --r-btn: 6px;
  --r-card: 10px;
  --r-pill: 100px;

  /* === Shadows (subtle elevation) === */
  --sh-sm: 0 1px 2px oklch(20% 0.01 40 / 0.04);
  --sh-md: 0 2px 8px oklch(20% 0.01 40 / 0.06), 0 1px 2px oklch(20% 0.01 40 / 0.04);
  --sh-lg: 0 8px 24px oklch(20% 0.01 40 / 0.08), 0 2px 6px oklch(20% 0.01 40 / 0.04);

  /* === Motion === */
  --ease: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-in: cubic-bezier(0.7, 0, 0.84, 0);
  --dur-1: 120ms;
  --dur-2: 280ms;
  --dur-3: 500ms;
}

[data-theme="dark"] {
  --bg:        oklch(13% 0.006 40);
  --surface:   oklch(17% 0.008 40);
  --surface-2: oklch(21% 0.01 40);
  --border:    oklch(27% 0.01 40);
  --border-hi: oklch(33% 0.012 40);
  --text:      oklch(93% 0.008 40);
  --text-2:    oklch(72% 0.01 40);
  --text-3:    oklch(52% 0.008 40);
  --brand:     oklch(70% 0.12 35);
  --brand-hi:  oklch(76% 0.1 35);
  --brand-lo:  oklch(60% 0.12 35);
  --brand-bg:  oklch(21% 0.035 35);
  --ok-bg:     oklch(21% 0.03 140);
  --err-bg:    oklch(21% 0.035 25);
  --sh-sm: 0 1px 2px oklch(0% 0 0 / 0.2);
  --sh-md: 0 2px 8px oklch(0% 0 0 / 0.25), 0 1px 2px oklch(0% 0 0 / 0.15);
  --sh-lg: 0 8px 24px oklch(0% 0 0 / 0.3), 0 2px 6px oklch(0% 0 0 / 0.2);
}

/* === Reset === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-wrap: pretty;
  transition: background var(--dur-2) var(--ease), color var(--dur-2) var(--ease);
}

::selection { background: var(--brand); color: oklch(99% 0.005 40); }

/* === Layout === */
.page { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--s-5); height: 60px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
}

.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 16px; height: 16px; border-radius: 3px;
  background: var(--brand);
  position: relative;
}
.brand-mark::after {
  content: ''; position: absolute; inset: 3px;
  border-radius: 1px; background: var(--bg);
}
.brand-name {
  font-family: var(--font-display);
  font-weight: 600; font-size: 19px;
  letter-spacing: -0.02em;
  font-style: italic;
}

.theme-toggle {
  width: 38px; height: 38px;
  border: 1px solid var(--border); border-radius: var(--r-btn);
  background: var(--bg); color: var(--text-2);
  cursor: pointer; display: grid; place-items: center;
  transition: border-color var(--dur-2) var(--ease), color var(--dur-2) var(--ease);
}
.theme-toggle:hover { border-color: var(--text-3); color: var(--text); }
.theme-toggle:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

.main {
  flex: 1; max-width: 680px; width: 100%;
  margin: 0 auto; padding: var(--s-7) var(--s-5) var(--s-8);
}

/* === Typography === */
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(34px, 5.5vw, 48px);
  font-weight: 600; font-style: italic;
  letter-spacing: -0.03em; line-height: 1.08;
  color: var(--text);
}
.hero-title em {
  font-style: normal; font-weight: 400;
  color: var(--brand);
}
.hero-lede {
  font-size: 17px; color: var(--text-2);
  margin-top: var(--s-3); max-width: 38ch; line-height: 1.5;
}

.section-label {
  font-family: var(--font-body);
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-3);
  margin-bottom: var(--s-3);
}

/* === Form === */
.form-section { margin-top: var(--s-6); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); margin-bottom: var(--s-4); }
.field { display: flex; flex-direction: column; gap: var(--s-1); }
.field-label {
  font-size: 13px; font-weight: 500; color: var(--text-2);
  font-family: var(--font-body);
}
.input {
  height: 46px; padding: 0 var(--s-3);
  border: 1px solid var(--border); border-radius: var(--r-input);
  background: var(--bg); color: var(--text);
  font-family: var(--font-body); font-size: 15px;
  transition: border-color var(--dur-2) var(--ease), box-shadow var(--dur-2) var(--ease);
}
.input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-bg); }
.input::placeholder { color: var(--text-3); }

/* === Buttons === */
.btn {
  height: 46px; padding: 0 var(--s-5);
  border: none; border-radius: var(--r-btn);
  font-family: var(--font-body); font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: opacity var(--dur-1) var(--ease), transform var(--dur-1) var(--ease), background var(--dur-1) var(--ease);
  display: inline-flex; align-items: center; gap: var(--s-2); justify-content: center;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-primary {
  background: var(--text); color: var(--bg);
}
.btn-primary:hover { opacity: 0.85; }

.btn-cta {
  background: var(--brand); color: oklch(99% 0.005 40);
  width: 100%; height: 50px; font-size: 15px; font-weight: 700;
  box-shadow: var(--sh-sm);
}
.btn-cta:hover { background: var(--brand-hi); }

.btn-ghost {
  background: transparent; color: var(--text-2);
  border: 1px solid var(--border); height: 34px; font-size: 13px; padding: 0 var(--s-3);
  border-radius: var(--r-btn);
}
.btn-ghost:hover { background: var(--surface); color: var(--text); border-color: var(--border-hi); }
.btn-ghost:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

/* === Status === */
.status {
  padding: var(--s-3) var(--s-4);
  border-radius: var(--r-card);
  font-size: 14px; margin-top: var(--s-4);
  display: none;
}
.status.show { display: block; animation: fadeUp var(--dur-2) var(--ease); }
.status.loading { background: var(--brand-bg); color: var(--brand-lo); }
.status.error { background: var(--err-bg); color: var(--err); }
.status.success { background: var(--ok-bg); color: var(--ok); }

/* === Tabs === */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: var(--s-5);
}
.tab {
  padding: var(--s-3) var(--s-4);
  cursor: pointer;
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  color: var(--text-3);
  border-bottom: 2px solid transparent;
  transition: color var(--dur-2) var(--ease), border-color var(--dur-2) var(--ease);
  margin-bottom: -1px;
  display: flex; align-items: center; gap: 7px;
}
.tab:hover { color: var(--text-2); }
.tab.active { color: var(--text); border-bottom-color: var(--brand); font-weight: 600; }
.tab:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: var(--r-input); }

.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-short { background: oklch(60% 0.12 300); }
.dot-long  { background: oklch(65% 0.13 70); }
.dot-video { background: oklch(58% 0.13 250); }

/* === Result === */
.result-wrap {
  margin-top: var(--s-6);
  animation: fadeUp var(--dur-3) var(--ease);
}
.result-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: var(--s-4);
}
.result-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 600;
  letter-spacing: -0.02em; font-style: italic;
}
.result-actions { display: flex; gap: var(--s-2); }

.result-body { margin-top: var(--s-3); }
.result-label {
  font-size: 13px; font-weight: 600; color: var(--text-2);
  display: flex; align-items: center; gap: 7px;
  margin-bottom: var(--s-2);
}
.badge {
  font-size: 11px; padding: 2px 9px;
  border-radius: var(--r-pill); font-weight: 600;
}
.b-ok  { background: var(--ok-bg); color: var(--ok); }
.b-err { background: var(--err-bg); color: var(--err); }

.result-content {
  white-space: pre-wrap; word-break: break-word;
  font-size: 14px; line-height: 1.65;
  background: var(--surface); padding: var(--s-4);
  border-radius: var(--r-card); border: 1px solid var(--border);
  max-height: 460px; overflow-y: auto;
  font-variant-numeric: tabular-nums;
}
.result-content:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

.result-tools {
  display: flex; gap: var(--s-2); margin-top: var(--s-3);
}

/* === History === */
.history-section { margin-top: var(--s-7); }
.history-list { margin-top: var(--s-3); }
.hi {
  cursor: pointer; padding: var(--s-3) 0;
  border-bottom: 1px solid var(--border);
  transition: padding-left var(--dur-2) var(--ease);
}
.hi:last-child { border-bottom: none; }
.hi:hover { padding-left: var(--s-3); }
.hi-name {
  font-weight: 600; font-size: 14px;
  font-family: var(--font-body);
  display: flex; align-items: center; gap: 7px;
}
.hi-count {
  font-size: 11px; font-weight: 600;
  background: var(--surface-2); color: var(--text-3);
  padding: 1px 7px; border-radius: var(--r-pill);
}
.hi-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.hi-pv {
  font-size: 13px; color: var(--text-3); margin-top: 3px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: var(--font-display); font-style: italic;
}
.empty {
  text-align: center; color: var(--text-3);
  padding: var(--s-6) 0; font-size: 14px;
}

/* === Settings === */
.settings-link { margin-top: var(--s-3); text-align: center; }
.settings-link a {
  color: var(--text-3); font-size: 13px;
  cursor: pointer; transition: color var(--dur-2) var(--ease);
  text-decoration: none;
}
.settings-link a:hover { color: var(--brand); }

.modal-bg {
  display: none; position: fixed; inset: 0;
  background: oklch(10% 0.005 40 / 0.4);
  z-index: 100;
  justify-content: center; align-items: center;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.modal-bg.show { display: flex; animation: fadeIn var(--dur-2) var(--ease); }
.modal {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: var(--s-5); width: 400px; max-width: calc(100vw - 32px);
  box-shadow: var(--sh-lg);
  animation: fadeUp var(--dur-2) var(--ease);
}
.modal-title {
  font-family: var(--font-display); font-size: 20px; font-weight: 600;
  font-style: italic; letter-spacing: -0.02em;
  margin-bottom: var(--s-1);
}
.modal-desc { color: var(--text-3); font-size: 13px; margin-bottom: var(--s-5); }
.modal .field + .field { margin-top: var(--s-3); }
.modal-actions { display: flex; gap: var(--s-2); margin-top: var(--s-5); }

/* === Footer === */
.footer {
  border-top: 1px solid var(--border);
  padding: var(--s-4) var(--s-5); text-align: center;
  font-size: 12px; color: var(--text-3);
  font-family: var(--font-display); font-style: italic;
}

/* === Animations === */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* === Scrollbar === */
.result-content::-webkit-scrollbar { width: 6px; }
.result-content::-webkit-scrollbar-track { background: transparent; }
.result-content::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
.result-content::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* === Responsive === */
@media (max-width: 560px) {
  .form-row { grid-template-columns: 1fr; }
  .main { padding: var(--s-5) var(--s-4) var(--s-6); }
  .header { padding: 0 var(--s-4); }
}

/* === Safe area === */
@supports (padding: env(safe-area-inset-bottom)) {
  .footer { padding-bottom: max(var(--s-4), env(safe-area-inset-bottom)); }
}
</style>
</head>
<body data-theme="light">

<div class="page">
  <header class="header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <span class="brand-name">BlissFlow</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切換深色模式">
      <svg id="iSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M5 5l1.5 1.5M17.5 17.5L19 19M3 12h2M19 12h2M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>
      <svg id="iMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M20 12.5A8 8 0 1 1 11.5 4a6.5 6.5 0 0 0 8.5 8.5z"/></svg>
    </button>
  </header>

  <main class="main">
    <h1 class="hero-title">文案<em>生成器</em></h1>
    <p class="hero-lede">輸入產品資訊，一鍵同時生成短文案、長文案、視頻文案三種格式。</p>

    <div class="form-section">
      <div class="section-label">產品資訊</div>
      <div class="form-row">
        <div class="field">
          <label class="field-label" for="productName">產品名稱</label>
          <input class="input" type="text" id="productName" placeholder="高腰A字傘裙" />
        </div>
        <div class="field">
          <label class="field-label" for="productUrl">產品 URL</label>
          <input class="input" type="text" id="productUrl" placeholder="https://blissshop.life/..." />
        </div>
      </div>
      <button class="btn btn-cta" id="genBtn" onclick="generateAll()">一鍵生成三種文案</button>
      <div class="settings-link"><a onclick="openSettings()">設定 API Key</a></div>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <div id="resultWrap" class="result-wrap" style="display:none;">
      <div class="result-head">
        <span class="result-title" id="resultTitle"></span>
        <div class="result-actions">
          <button class="btn-ghost" onclick="downloadAll()">下載全部</button>
        </div>
      </div>
      <div class="tabs" id="tabs" role="tablist"></div>
      <div id="resultBody"></div>
    </div>

    <div class="history-section">
      <div class="section-label">歷史記錄</div>
      <div class="history-list" id="history"></div>
    </div>
  </main>

  <footer class="footer">BlissFlow · DashScope API · 純前端運行</footer>
</div>

<div class="modal-bg" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">設定</h2>
    <p class="modal-desc">API Key 存於瀏覽器 localStorage，不會上傳至任何伺服器。</p>
    <div class="field">
      <label class="field-label" for="apiKeyInput">DashScope API Key</label>
      <input class="input" type="password" id="apiKeyInput" placeholder="sk-..." />
    </div>
    <div class="field">
      <label class="field-label" for="modelInput">模型</label>
      <input class="input" type="text" id="modelInput" placeholder="qwen3.7-plus" value="qwen3.7-plus" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
      <button class="btn-ghost" onclick="closeSettings()">取消</button>
    </div>
  </div>
</div>

<script>

const PROMPTS={
short:'你是一個電商專家. 這是你經營的國際電商獨立站 www.blissshop.life , 我會比不同的產品名稱及連結比你, 你分別用地道的廣東話, 日文, 及英文, 用20種不同表達方式(就是給我創作20個文案), 每個表達只有2-6句就可以, 每句需要加上emojis及這句"本店所有產品支援全球送貨". 目的是要針對人的痛點或挑起人的情感及購買慾, 立即去下單購買.',
long:'你是一個電商專家, 你是幫我的網店(www.blissshop.life)內的產品 , 去創作文案, 在不同的社交平台上發表. 我會把產品的連結給你, 你幫我參考以下文案, 來創作出6遍(不同內容風格)跟我給你的產品的介紹內容給我. 要比埋emojis比我。 另外每個文案的結尾幫我加上一句： 本店所有產品支援全球送貨。\n\n參考文案:\n日本Scour Towels 廚房環保不織布抹布\n💯一套6卷💯\n激抵呀～～～～\n日本原價 $38/卷\n依家 $6.5 /卷，好好用架～\n最抵最抵最抵\n,超超超抵呀🈹🈹🈹🈹🈹\n勁好用推薦‼️傳統抹布潛藏大量細菌，比馬桶還髒，有害健康，不織布免洗式多用抹布，乾濕兩用，點斷式設計。\n一次性使用，即撕即用，用完即扔，特別方便。\n廚房清潔、外出野餐都可以使用哦。\n採用竹纖維無紡布，不含熒光劑，抗菌無毒，不黏油，去污效果好，有一擦即淨的功效。\n✎商品特色✎\n🉐環保無紡布抹布\n🉐採用衛生清潔的不織布\n🉐具有衛生、清潔、吸水性強、無毒素、柔軟耐洗、不易生菌，\n🉐有一擦即淨的功效唷！\n✎商品規格✎一套6 卷\n◎商品材質：無紡布\n◎商品尺寸：50張 (每片20x30cm)',
video:'你是一個youtube short 平台的產品推廣專家, 需要給你我的產品資料, 你用非常吸引的方式去用英文寫文案出來, 去吸引消息者注意及購買. 同時要提供\n1. 吸引人的headling\n2. 相関的hashtags\n3. 相関的CHANNEL TAGS, 用@開頭\n4. 相関的tags, 要用","去分開\n5. 我們的網上聯系方式: http://bit.ly/1FBLIVECHAT\n6. 我們的web: blisstravel.life\n明白我的要求嗎?'
};
const TI={short:{n:'短文案',f:'短文案',d:'dot-short'},long:{n:'長文案',f:'長文案',d:'dot-long'},video:{n:'視頻文案',f:'視頻文案',d:'dot-video'}};

let history=[],CR=null,CN='',AT='short';

function getKey(){return localStorage.getItem('ds_key')||'';}
function getModel(){return localStorage.getItem('ds_model')||'qwen3.7-plus';}
function openSettings(){document.getElementById('apiKeyInput').value=getKey();document.getElementById('modelInput').value=getModel();document.getElementById('settingsModal').classList.add('show');}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function saveSettings(){localStorage.setItem('ds_key',document.getElementById('apiKeyInput').value.trim());localStorage.setItem('ds_model',document.getElementById('modelInput').value.trim());closeSettings();}
if(!getKey())setTimeout(openSettings,600);

function toggleTheme(){const b=document.body;t=b.getAttribute('data-theme');b.setAttribute('data-theme',t==='light'?'dark':'light');document.getElementById('iSun').style.display=t==='light'?'none':'block';document.getElementById('iMoon').style.display=t==='light'?'block':'none';}

async function callDS(sp,um){
  const k=getKey(),m=getModel();
  if(!k)throw new Error('請先設定 API Key');
  const r=await fetch(DASHSCOPE_URL,{method:'POST',headers:{'Authorization':'Bearer '+k,'Content-Type':'application/json'},body:JSON.stringify({model:m,messages:[{role:'system',content:sp},{role:'user',content:um}]})});
  if(!r.ok){const e=await r.text();throw new Error('API錯誤('+r.status+'): '+e);}
  const d=await r.json();return d.choices[0].message.content;
}

async function generateAll(){
  const name=document.getElementById('productName').value.trim(),url=document.getElementById('productUrl').value.trim();
  const btn=document.getElementById('genBtn'),st=document.getElementById('status');
  if(!name||!url){st.className='status show error';st.textContent='請填寫產品名稱和 URL';return;}
  if(!getKey()){openSettings();return;}
  btn.disabled=true;st.className='status show loading';st.textContent='Qwen 同時生成三種文案中… 通常需要 30-90 秒';
  document.getElementById('resultWrap').style.display='none';
  const um=url+' 超抵價，百幾蚊就可係BLISS SHOP入手 — '+name;
  const types=['short','long','video'];
  const rs=await Promise.allSettled(types.map(t=>callDS(PROMPTS[t],um)));
  CR={};let ok=0;
  types.forEach((t,i)=>{if(rs[i].status==='fulfilled'){CR[t]={c:rs[i].value,e:false};ok++;}else{CR[t]={c:'生成失敗: '+rs[i].reason.message,e:true};}});
  CN=name;AT=types.find(t=>!CR[t].e)||'short';
  if(ok===3){st.className='status show success';st.textContent='三種文案全部生成完成';}
  else if(ok===0){st.className='status show error';st.textContent='全部生成失敗';}
  else{st.className='status show success';st.textContent=ok+'/3 成功，'+(3-ok)+' 個失敗';}
  renderResult(name);renderTabs();
  history.unshift({name,url,results:JSON.parse(JSON.stringify(CR)),time:new Date().toLocaleString('zh-HK')});
  renderHistory();btn.disabled=false;
}

async function continueOne(type){
  const st=document.getElementById('status'),info=TI[type];
  if(!CR||!CR[type]||CR[type].e)return;
  st.className='status show loading';st.textContent='繼續生成'+info.n+'中…';
  try{const c=await callDS(PROMPTS[type],'繼續生成剩餘的文案，從上次中斷的地方接著寫。以下是已生成的內容：\n\n'+CR[type].c);
  CR[type].c+='\n\n'+c;st.className='status show success';st.textContent=info.n+'繼續生成完成';renderBody();}
  catch(e){st.className='status show error';st.textContent=e.message;}
}

function renderTabs(){document.getElementById('tabs').innerHTML=Object.entries(TI).map(([k,i])=>`<div class="tab ${k===AT?'active':''}" onclick="switchTab('${k}')" role="tab" tabindex="${k===AT?0:-1}"><span class="dot ${i.d}"></span>${i.n}${CR&&CR[k]?(CR[k].e?' ✕':' ✓'):''}</div>`).join('');}
function switchTab(t){AT=t;renderTabs();renderBody();}
function renderResult(name){document.getElementById('resultWrap').style.display='block';document.getElementById('resultTitle').textContent=name;renderBody();}
function renderBody(){
  const info=TI[AT],data=CR[AT],el=document.getElementById('resultBody');
  el.innerHTML=`<div class="result-body"><div class="result-label"><span class="dot ${info.d}"></span>${info.n}${data.e?' <span class="badge b-err">失敗</span>':' <span class="badge b-ok">完成</span>'}</div><div class="result-content" tabindex="0">${esc(data.c)}</div>${data.e?'':`<div class="result-tools"><button class="btn-ghost" onclick="copyOne('${AT}')">複製</button><button class="btn-ghost" onclick="continueOne('${AT}')">繼續生成</button><button class="btn-ghost" onclick="downloadOne('${AT}')">下載</button></div>`}</div>`;
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function copyOne(t){navigator.clipboard.writeText(CR[t].c);alert(TI[t].n+' 已複製');}
function downloadOne(t){const b=new Blob([CR[t].c],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=CN+'_'+TI[t].f+'.txt';a.click();}
function downloadAll(){Object.keys(TI).forEach(t=>{if(CR[t]&&!CR[t].e)downloadOne(t);});}

function renderHistory(){
  const el=document.getElementById('history');
  if(!history.length){el.innerHTML='<div class="empty">暫無記錄</div>';return;}
  el.innerHTML=history.map((h,i)=>{const ts=Object.keys(TI).filter(t=>h.results[t]&&!h.results[t].e);return '<div class="hi" onclick="showHistory('+i+')"><div class="hi-name">'+h.name+'<span class="hi-count">'+ts.length+'/3</span></div><div class="hi-meta">'+h.time+' · '+ts.map(t=>TI[t].n).join(' / ')+'</div><div class="hi-pv">'+(h.results.short?h.results.short.c.substring(0,80):'…')+'…</div></div>';}).join('');
}
function showHistory(i){const h=history[i];CR=JSON.parse(JSON.stringify(h.results));CN=h.name;AT=Object.keys(TI).find(t=>h.results[t]&&!h.results[t].e)||'short';document.getElementById('productName').value=h.name;document.getElementById('productUrl').value=h.url;renderResult(h.name);renderTabs();window.scrollTo({top:0,behavior:'smooth'});}
renderHistory();
</script>
</body>
</html>
