<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BlissFlow — 文案生成器</title>
<style>
/* === Fonts: Plus Jakarta Sans (display) + Instrument Sans (body) === */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap');

/* === OKLCH Color System — warm tinted neutrals + bold accent === */
:root {
  /* Tinted neutrals (warm hue ~50) */
  --bg:          oklch(99% 0.005 50);
  --surface:     oklch(97% 0.008 50);
  --surface-2:   oklch(94% 0.01 50);
  --border:      oklch(90% 0.012 50);
  --border-2:    oklch(86% 0.014 50);
  --text:        oklch(22% 0.015 50);
  --text-2:      oklch(45% 0.012 50);
  --text-3:      oklch(60% 0.01 50);
  
  /* Brand accent — deep coral/terracotta */
  --accent:      oklch(62% 0.19 28);
  --accent-hi:   oklch(68% 0.17 28);
  --accent-lo:   oklch(52% 0.16 28);
  --accent-bg:   oklch(95% 0.03 28);
  
  /* Semantic */
  --ok:          oklch(55% 0.15 145);
  --ok-bg:       oklch(95% 0.03 145);
  --err:         oklch(55% 0.18 25);
  --err-bg:      oklch(95% 0.03 25);
  
  /* Type */
  --font-display: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --font-body: 'Instrument Sans', -apple-system, sans-serif;
  
  /* Spacing scale (4pt base) */
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px;
  
  /* Motion */
  --ease: cubic-bezier(0.25, 1, 0.5, 1);
  --dur-fast: 120ms; --dur: 220ms; --dur-slow: 400ms;
}

[data-theme="dark"] {
  --bg:        oklch(14% 0.008 50);
  --surface:   oklch(18% 0.01 50);
  --surface-2: oklch(22% 0.012 50);
  --border:    oklch(28% 0.012 50);
  --border-2:  oklch(34% 0.014 50);
  --text:      oklch(92% 0.01 50);
  --text-2:    oklch(72% 0.012 50);
  --text-3:    oklch(55% 0.01 50);
  --accent:    oklch(68% 0.16 28);
  --accent-hi: oklch(74% 0.14 28);
  --accent-lo: oklch(58% 0.15 28);
  --accent-bg: oklch(22% 0.04 28);
  --ok-bg:     oklch(22% 0.04 145);
  --err-bg:    oklch(22% 0.04 25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}

::selection { background: var(--accent); color: oklch(99% 0.005 50); }

/* === Layout === */
.page { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

.header {
  padding: var(--s-4) var(--s-5);
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: var(--s-2); font-family: var(--font-display); font-weight: 800; font-size: 18px; letter-spacing: -0.03em; }
.brand-mark { width: 14px; height: 14px; background: var(--accent); border-radius: 2px; transform: rotate(45deg); }

.theme-btn {
  width: 36px; height: 36px; border: 1px solid var(--border); background: var(--bg);
  border-radius: 6px; cursor: pointer; display: grid; place-items: center;
  color: var(--text-2); transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease);
}
.theme-btn:hover { border-color: var(--text-3); color: var(--text); }

.main { flex: 1; max-width: 680px; width: 100%; margin: 0 auto; padding: var(--s-7) var(--s-5) var(--s-8); }

/* === Typography === */
h1 { font-family: var(--font-display); font-size: clamp(32px, 5vw, 44px); font-weight: 800; letter-spacing: -0.04em; line-height: 1.05; }
.lede { color: var(--text-2); font-size: 17px; margin-top: var(--s-2); max-width: 42ch; }
h2 { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }

/* === Form === */
.form-section { margin-top: var(--s-6); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); margin-bottom: var(--s-4); }
.field { display: flex; flex-direction: column; gap: var(--s-1); }
.label { font-size: 13px; font-weight: 600; color: var(--text-2); font-family: var(--font-display); }
.input {
  height: 44px; padding: 0 var(--s-3); border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px;
  transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
.input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.input::placeholder { color: var(--text-3); }

/* === Buttons === */
.btn {
  height: 44px; padding: 0 var(--s-5); border: none; border-radius: 6px;
  background: var(--text); color: var(--bg); font-family: var(--font-display); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
  display: inline-flex; align-items: center; gap: var(--s-2); justify-content: center;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-cta {
  background: var(--accent); color: oklch(99% 0.005 50); width: 100%; height: 48px; font-size: 15px; font-weight: 700;
}
.btn-cta:hover { background: var(--accent-hi); opacity: 1; }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); height: 34px; font-size: 13px; padding: 0 var(--s-3); }
.btn-ghost:hover { background: var(--surface); color: var(--text); opacity: 1; }

/* === Status === */
.status { padding: var(--s-3) var(--s-4); border-radius: 6px; font-size: 14px; margin-top: var(--s-4); display: none; }
.status.show { display: block; animation: fade-in var(--dur) var(--ease); }
.status.loading { background: var(--accent-bg); color: var(--accent-lo); }
.status.error { background: var(--err-bg); color: var(--err); }
.status.success { background: var(--ok-bg); color: var(--ok); }

/* === Tabs === */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: var(--s-5); }
.tab {
  padding: var(--s-3) var(--s-4); cursor: pointer; font-family: var(--font-display); font-size: 14px; font-weight: 600;
  color: var(--text-3); border-bottom: 2px solid transparent; transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease);
  margin-bottom: -1px; display: flex; align-items: center; gap: var(--s-2);
}
.tab:hover { color: var(--text-2); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-short { background: oklch(60% 0.15 300); }
.dot-long { background: oklch(65% 0.15 70); }
.dot-video { background: oklch(58% 0.16 250); }

/* === Result === */
.result-wrap { margin-top: var(--s-6); animation: slide-up var(--dur-slow) var(--ease); }
.result-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--s-4); }
.result-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.result-actions { display: flex; gap: var(--s-2); }

.result-body { margin-top: var(--s-3); }
.result-label { font-size: 13px; font-weight: 600; color: var(--text-2); display: flex; align-items: center; gap: var(--s-2); margin-bottom: var(--s-2); font-family: var(--font-display); }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; font-family: var(--font-body); }
.b-ok { background: var(--ok-bg); color: var(--ok); }
.b-err { background: var(--err-bg); color: var(--err); }
.result-content {
  white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.65;
  background: var(--surface); padding: var(--s-4); border-radius: 6px; border: 1px solid var(--border);
  max-height: 460px; overflow-y: auto; font-variant-numeric: tabular-nums;
}
.result-tools { display: flex; gap: var(--s-2); margin-top: var(--s-3); }

/* === History === */
.history-section { margin-top: var(--s-7); }
.history-list { margin-top: var(--s-3); }
.hi {
  cursor: pointer; padding: var(--s-3) 0; border-bottom: 1px solid var(--border);
  transition: padding-left var(--dur) var(--ease);
}
.hi:last-child { border-bottom: none; }
.hi:hover { padding-left: var(--s-3); }
.hi-name { font-weight: 600; font-size: 14px; font-family: var(--font-display); }
.hi-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.hi-pv { font-size: 13px; color: var(--text-3); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.empty { text-align: center; color: var(--text-3); padding: var(--s-6) 0; font-size: 14px; }

/* === Settings === */
.settings-link { margin-top: var(--s-3); text-align: center; }
.settings-link a { color: var(--text-3); font-size: 13px; cursor: pointer; transition: color var(--dur) var(--ease); text-decoration: none; }
.settings-link a:hover { color: var(--accent); }

.modal-bg {
  display: none; position: fixed; inset: 0; background: oklch(10% 0.005 50 / 0.5);
  z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(6px);
}
.modal-bg.show { display: flex; animation: fade-in var(--dur) var(--ease); }
.modal {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: var(--s-5); width: 400px; max-width: calc(100vw - 32px);
  animation: slide-up var(--dur) var(--ease);
}
.modal h2 { margin-bottom: var(--s-1); }
.modal-desc { color: var(--text-3); font-size: 13px; margin-bottom: var(--s-5); }
.modal .field + .field { margin-top: var(--s-3); }
.modal-actions { display: flex; gap: var(--s-2); margin-top: var(--s-5); }

/* === Footer === */
.footer { border-top: 1px solid var(--border); padding: var(--s-4) var(--s-5); text-align: center; font-size: 12px; color: var(--text-3); }

/* === Animations === */
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes slide-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* === Responsive === */
@media (max-width: 560px) {
  .form-row { grid-template-columns: 1fr; }
  .main { padding: var(--s-5) var(--s-4) var(--s-6); }
}

/* === Scrollbar === */
.result-content::-webkit-scrollbar { width: 6px; }
.result-content::-webkit-scrollbar-track { background: transparent; }
.result-content::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
</style>
</head>
<body data-theme="light">

<div class="page">
  <header class="header">
    <div class="brand">
      <div class="brand-mark"></div>
      <span>BlissFlow</span>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="切換主題">
      <svg id="iSun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.5 4.5l1.5 1.5M18 18l1.5 1.5M2 12h2M20 12h2M4.5 19.5L6 18M18 6l1.5-1.5"/></svg>
      <svg id="iMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M20 12.5A8 8 0 1 1 11.5 4a6.5 6.5 0 0 0 8.5 8.5z"/></svg>
    </button>
  </header>

  <main class="main">
    <h1>文案生成器</h1>
    <p class="lede">輸入產品資訊，一鍵生成短文案、長文案、視頻文案三種格式。</p>

    <div class="form-section">
      <div class="form-row">
        <div class="field">
          <label class="label" for="productName">產品名稱</label>
          <input class="input" type="text" id="productName" placeholder="高腰A字傘裙" />
        </div>
        <div class="field">
          <label class="label" for="productUrl">產品 URL</label>
          <input class="input" type="text" id="productUrl" placeholder="https://blissshop.life/..." />
        </div>
      </div>
      <button class="btn btn-cta" id="genBtn" onclick="generateAll()">一鍵生成三種文案</button>
      <div class="settings-link"><a onclick="openSettings()">設定 API Key</a></div>
    </div>

    <div id="status" class="status"></div>

    <div id="resultWrap" class="result-wrap" style="display:none;">
      <div class="result-head">
        <span class="result-title" id="resultTitle"></span>
        <div class="result-actions">
          <button class="btn-ghost" onclick="downloadAll()">下載全部</button>
        </div>
      </div>
      <div class="tabs" id="tabs"></div>
      <div id="resultBody"></div>
    </div>

    <div class="history-section">
      <h2>歷史記錄</h2>
      <div class="history-list" id="history"></div>
    </div>
  </main>

  <footer class="footer">BlissFlow · DashScope API · 純前端運行</footer>
</div>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h2>設定</h2>
    <p class="modal-desc">API Key 存於瀏覽器 localStorage，不會上傳。</p>
    <div class="field">
      <label class="label" for="apiKeyInput">DashScope API Key</label>
      <input class="input" type="password" id="apiKeyInput" placeholder="sk-..." />
    </div>
    <div class="field">
      <label class="label" for="modelInput">模型</label>
      <input class="input" type="text" id="modelInput" placeholder="qwen3.7-plus" value="qwen3.7-plus" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="saveSettings()">保存</button>
      <button class="btn-ghost" onclick="closeSettings()">取消</button>
    </div>
  </div>
</div>

<script>
const DASHSCOPE_URL='https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
const PROMPTS={
short:'你是一個電商專家. 這是你經營的國際電商獨立站 www.blissshop.life , 我會比不同的產品名稱及連結比你, 你分別用地道的廣東話, 日文, 及英文, 用20種不同表達方式(就是給我創作20個文案), 每個表達只有2-6句就可以, 每句需要加上emojis及這句"本店所有產品支援全球送貨". 目的是要針對人的痛點或挑起人的情感及購買慾, 立即去下單購買.',
long:'你是一個電商專家, 你是幫我的網店(www.blissshop.life)內的產品 , 去創作文案, 在不同的社交平台上發表. 我會把產品的連結給你, 你幫我參考以下文案, 來創作出6遍(不同內容風格)跟我給你的產品的介紹內容給我. 要比埋emojis比我。 另外每個文案的結尾幫我加上一句： 本店所有產品支援全球送貨。\n\n參考文案:\n日本Scour Towels 廚房環保不織布抹布\n💯一套6卷💯\n激抵呀～～～～\n日本原價 $38/卷\n依家 $6.5 /卷，好好用架～\n最抵最抵最抵\n,超超超抵呀🈹🈹🈹🈹🈹\n勁好用推薦‼️傳統抹布潛藏大量細菌，比馬桶還髒，有害健康，不織布免洗式多用抹布，乾濕兩用，點斷式設計。\n一次性使用，即撕即用，用完即扔，特別方便。\n廚房清潔、外出野餐都可以使用哦。\n採用竹纖維無紡布，不含熒光劑，抗菌無毒，不黏油，去污效果好，有一擦即淨的功效。\n✎商品特色✎\n🉐環保無紡布抹布\n🉐採用衛生清潔的不織布\n🉐具有衛生、清潔、吸水性強、無毒素、柔軟耐洗、不易生菌，\n🉐有一擦即淨的功效唷！\n✎商品規格✎一套6 卷\n◎商品材質：無紡布\n◎商品尺寸：50張 (每片20x30cm)',
video:'你是一個youtube short 平台的產品推廣專家, 需要給你我的產品資料, 你用非常吸引的方式去用英文寫文案出來, 去吸引消息者注意及購買. 同時要提供\n1. 吸引人的headling\n2. 相関的hashtags\n3. 相関的CHANNEL TAGS, 用@開頭\n4. 相関的tags, 要用","去分開\n5. 我們的網上聯系方式: http://bit.ly/1FBLIVECHAT\n6. 我們的web: blisstravel.life\n明白我的要求嗎?'
};
const TI={short:{n:'短文案',f:'短文案',d:'dot-short'},long:{n:'長文案',f:'長文案',d:'dot-long'},video:{n:'視頻文案',f:'視頻文案',d:'dot-video'}};

let history=[],CR=null,CN='',AT='short';

function getKey(){return localStorage.getItem('ds_key')||'';}
function getModel(){return localStorage.getItem('ds_model')||'qwen3.7-plus';}
function openSettings(){document.getElementById('apiKeyInput').value=getKey();document.getElementById('modelInput').value=getModel();document.getElementById('settingsModal').classList.add('show');}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function saveSettings(){localStorage.setItem('ds_key',document.getElementById('apiKeyInput').value.trim());localStorage.setItem('ds_model',document.getElementById('modelInput').value.trim());closeSettings();}
if(!getKey())setTimeout(openSettings,500);

function toggleTheme(){const b=document.body;t=b.getAttribute('data-theme');b.setAttribute('data-theme',t==='light'?'dark':'light');document.getElementById('iSun').style.display=t==='light'?'none':'block';document.getElementById('iMoon').style.display=t==='light'?'block':'none';}

async function callDS(sp,um){
  const k=getKey(),m=getModel();
  if(!k)throw new Error('請先設定 API Key');
  const r=await fetch(DASHSCOPE_URL,{method:'POST',headers:{'Authorization':'Bearer '+k,'Content-Type':'application/json'},body:JSON.stringify({model:m,messages:[{role:'system',content:sp},{role:'user',content:um}]})});
  if(!r.ok){const e=await r.text();throw new Error('API錯誤('+r.status+'): '+e);}
  const d=await r.json();return d.choices[0].message.content;
}

async function generateAll(){
  const name=document.getElementById('productName').value.trim(),url=document.getElementById('productUrl').value.trim();
  const btn=document.getElementById('genBtn'),st=document.getElementById('status');
  if(!name||!url){st.className='status show error';st.textContent='請填寫產品名稱和 URL';return;}
  if(!getKey()){openSettings();return;}
  btn.disabled=true;st.className='status show loading';st.textContent='Qwen 同時生成三種文案中… 通常需要 30-90 秒';
  document.getElementById('resultWrap').style.display='none';
  const um=url+' 超抵價，百幾蚊就可係BLISS SHOP入手 — '+name;
  const types=['short','long','video'];
  const rs=await Promise.allSettled(types.map(t=>callDS(PROMPTS[t],um)));
  CR={};let ok=0;
  types.forEach((t,i)=>{if(rs[i].status==='fulfilled'){CR[t]={c:rs[i].value,e:false};ok++;}else{CR[t]={c:'生成失敗: '+rs[i].reason.message,e:true};}});
  CN=name;AT=types.find(t=>!CR[t].e)||'short';
  if(ok===3)st.className='status show success',st.textContent='三種文案全部生成完成';
  else if(ok===0)st.className='status show error',st.textContent='全部生成失敗';
  else st.className='status show success',st.textContent=ok+'/3 成功，'+(3-ok)+' 個失敗';
  renderResult(name);renderTabs();
  history.unshift({name,url,results:JSON.parse(JSON.stringify(CR)),time:new Date().toLocaleString('zh-HK')});
  renderHistory();btn.disabled=false;
}

async function continueOne(type){
  const st=document.getElementById('status'),info=TI[type];
  if(!CR||!CR[type]||CR[type].e)return;
  st.className='status show loading';st.textContent='繼續生成'+info.n+'中…';
  try{const c=await callDS(PROMPTS[type],'繼續生成剩餘的文案，從上次中斷的地方接著寫。以下是已生成的內容：\n\n'+CR[type].c);
  CR[type].c+='\n\n'+c;st.className='status show success';st.textContent=info.n+'繼續生成完成';renderBody();}
  catch(e){st.className='status show error';st.textContent=e.message;}
}

function renderTabs(){document.getElementById('tabs').innerHTML=Object.entries(TI).map(([k,i])=>'<div class="tab '+(k===AT?'active':'')+'" onclick="switchTab(\''+k+'\')"><span class="dot '+i.d+'"></span>'+i.n+(CR&&CR[k]?(CR[k].e?' ✕':' ✓'):'')+'</div>').join('');}
function switchTab(t){AT=t;renderTabs();renderBody();}
function renderResult(name){document.getElementById('resultWrap').style.display='block';document.getElementById('resultTitle').textContent=name;renderBody();}
function renderBody(){
  const info=TI[AT],data=CR[AT],el=document.getElementById('resultBody');
  el.innerHTML='<div class="result-body"><div class="result-label"><span class="dot '+info.d+'"></span>'+info.n+(data.e?' <span class="badge b-err">失敗</span>':' <span class="badge b-ok">完成</span>')+'</div><div class="result-content">'+esc(data.c)+'</div>'+(data.e?'':'<div class="result-tools"><button class="btn-ghost" onclick="copyOne(\''+AT+'\')">複製</button><button class="btn-ghost" onclick="continueOne(\''+AT+'\')">繼續生成</button><button class="btn-ghost" onclick="downloadOne(\''+AT+'\')">下載</button></div>')+'</div>';
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function copyOne(t){navigator.clipboard.writeText(CR[t].c);alert(TI[t].n+' 已複製');}
function downloadOne(t){const b=new Blob([CR[t].c],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=CN+'_'+TI[t].f+'.txt';a.click();}
function downloadAll(){Object.keys(TI).forEach(t=>{if(CR[t]&&!CR[t].e)downloadOne(t);});}

function renderHistory(){
  const el=document.getElementById('history');
  if(!history.length){el.innerHTML='<div class="empty">暫無記錄</div>';return;}
  el.innerHTML=history.map((h,i)=>{const ts=Object.keys(TI).filter(t=>h.results[t]&&!h.results[t].e);return '<div class="hi" onclick="showHistory('+i+')"><div class="hi-name">'+h.name+' '+ts.length+'/3</div><div class="hi-meta">'+h.time+' · '+ts.map(t=>TI[t].n).join(' / ')+'</div><div class="hi-pv">'+(h.results.short?h.results.short.c.substring(0,80):'…')+'…</div></div>';}).join('');
}
function showHistory(i){const h=history[i];CR=JSON.parse(JSON.stringify(h.results));CN=h.name;AT=Object.keys(TI).find(t=>h.results[t]&&!h.results[t].e)||'short';document.getElementById('productName').value=h.name;document.getElementById('productUrl').value=h.url;renderResult(h.name);renderTabs();window.scrollTo({top:0,behavior:'smooth'});}
renderHistory();
</script>
</body>
</html>
