<head>

<style>
:root {
  --fg: #000; --bg: #fff; --sel: #79ffe1;
  --a1: #fafafa; --a2: #eaeaea; --a3: #999; --a4: #888; --a5: #666;
  --blue: #0070f3; --red: #ee0000; --purple: #7928ca; --pink: #ff0080;
  --blue-l: #e6f6ff; --red-l: #ffeaea;
  --r: 6px; --rs: 4px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
[data-theme="dark"] {
  --fg: #ededed; --bg: #000;
  --a1: #111; --a2: #333; --a3: #444; --a4: #666; --a5: #888;
  --blue-l: #002a44; --red-l: #330000;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--fg); font-size: 16px; -webkit-font-smoothing: antialiased; transition: background .2s, color .2s; }
::selection { background: var(--sel); color: #000; }

.page { min-height: 100vh; display: flex; flex-direction: column; }
.header { border-bottom: 1px solid var(--a2); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.header-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 18px; letter-spacing: -.02em; }
.header-logo .mark { width: 20px; height: 20px; background: var(--fg); clip-path: polygon(50% 0,100% 50%,50% 100%,0 50%); }
.theme-toggle { width:36px; height:36px; border-radius:var(--rs); border:1px solid var(--a2); background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; transition: border-color .15s; }
.theme-toggle:hover { border-color: var(--a3); }

.main { flex:1; max-width:720px; width:100%; margin:0 auto; padding:48px 24px; }
h1 { font-size:36px; font-weight:700; letter-spacing:-.04em; line-height:1.2; }
h2 { font-size:22px; font-weight:600; letter-spacing:-.02em; }
.desc { color: var(--a4); font-size:16px; margin-top:8px; }

.card { border:1px solid var(--a2); border-radius:var(--r); padding:24px; background:var(--bg); }
.card+.card { margin-top:16px; }

.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.fg { display:flex; flex-direction:column; gap:6px; }
.label { font-size:13px; font-weight:500; color:var(--a5); }
.input { width:100%; height:40px; padding:0 12px; border:1px solid var(--a2); border-radius:var(--rs); background:var(--bg); color:var(--fg); font-family:var(--font); font-size:14px; transition: border-color .15s, box-shadow .15s; }
.input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-l); }
.input::placeholder { color: var(--a3); }

.btn { height:40px; padding:0 20px; border:1px solid var(--a2); border-radius:var(--rs); background:var(--fg); color:var(--bg); font-family:var(--font); font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:8px; justify-content:center; }
.btn:hover { opacity:.85; }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-sec { background:var(--bg); color:var(--fg); }
.btn-sec:hover { background:var(--a1); opacity:1; }
.btn-grad { background:linear-gradient(90deg,var(--purple),var(--pink)); color:#fff; border:none; height:44px; font-size:15px; font-weight:600; width:100%; }
.btn-sm { height:32px; padding:0 12px; font-size:13px; }

.status { padding:10px 14px; border-radius:var(--rs); font-size:13px; margin-bottom:16px; display:none; border:1px solid; }
.status.show { display:block; }
.status.loading { background:var(--blue-l); border-color:var(--blue); color:var(--blue); }
.status.error { background:var(--red-l); border-color:var(--red); color:var(--red); }
.status.success { background:var(--blue-l); border-color:#50e3c2; color:var(--blue); }

.tabs { display:flex; gap:2px; border-bottom:1px solid var(--a2); margin-bottom:16px; }
.tab { padding:8px 16px; cursor:pointer; font-size:14px; font-weight:500; color:var(--a4); border-bottom:2px solid transparent; transition:color .15s,border-color .15s; display:flex; align-items:center; gap:6px; margin-bottom:-1px; }
.tab:hover { color:var(--fg); }
.tab.active { color:var(--fg); border-bottom-color:var(--fg); }
.dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.dot-short { background:#8b5cf6; } .dot-long { background:#f59e0b; } .dot-video { background:#3b82f6; }

.rh { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.rt { font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; }
.badge { font-size:11px; padding:2px 8px; border-radius:20px; font-weight:500; }
.b-ok { background:var(--blue-l); color:var(--blue); } .b-err { background:var(--red-l); color:var(--red); }
.rc { white-space:pre-wrap; word-break:break-word; font-size:14px; line-height:1.6; background:var(--a1); padding:16px; border-radius:var(--rs); border:1px solid var(--a2); max-height:480px; overflow-y:auto; }
.ra { display:flex; gap:8px; }

.hi { cursor:pointer; padding:12px 0; border-bottom:1px solid var(--a2); transition:padding-left .15s; }
.hi:last-child { border:none; } .hi:hover { padding-left:8px; }
.hi .name { font-weight:500; font-size:14px; }
.hi .meta { font-size:12px; color:var(--a4); margin-top:2px; }
.hi .pv { font-size:13px; color:var(--a5); margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.empty { text-align:center; color:var(--a3); padding:32px; font-size:14px; }

.mo { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; justify-content:center; align-items:center; backdrop-filter:blur(4px); }
.mo.show { display:flex; }
.mb { background:var(--bg); border:1px solid var(--a2); border-radius:var(--r); padding:24px; width:420px; max-width:90%; }
.mb h2 { margin-bottom:4px; } .mb .d { color:var(--a4); font-size:13px; margin-bottom:20px; }
.mb .fg+.fg { margin-top:12px; } .mb-a { display:flex; gap:8px; margin-top:20px; }

.sl { text-align:center; margin-top:12px; }
.sl a { color:var(--a4); font-size:13px; cursor:pointer; text-decoration:none; transition:color .15s; }
.sl a:hover { color:var(--fg); }

.footer { border-top:1px solid var(--a2); padding:16px 24px; text-align:center; font-size:12px; color:var(--a3); }

@media(max-width:600px) { .form-grid{grid-template-columns:1fr;} .main{padding:32px 16px;} h1{font-size:28px;} }
</style>
</head>

<script>

const PROMPTS={
short:'дҪ жҳҜдёҖеҖӢйӣ»е•Ҷе°Ҳе®¶. йҖҷжҳҜдҪ з¶“зҮҹзҡ„еңӢйҡӣйӣ»е•ҶзҚЁз«Ӣз«ҷ www.blissshop.life , жҲ‘жңғжҜ”дёҚеҗҢзҡ„з”ўе“ҒеҗҚзЁұеҸҠйҖЈзөҗжҜ”дҪ , дҪ еҲҶеҲҘз”Ёең°йҒ“зҡ„е»Јжқұи©ұ, ж—Ҙж–Ү, еҸҠиӢұж–Ү, з”Ё20зЁ®дёҚеҗҢиЎЁйҒ”ж–№ејҸ(е°ұжҳҜзөҰжҲ‘еүөдҪң20еҖӢж–ҮжЎҲ), жҜҸеҖӢиЎЁйҒ”еҸӘжңү2-6еҸҘе°ұеҸҜд»Ҙ, жҜҸеҸҘйңҖиҰҒеҠ дёҠemojisеҸҠйҖҷеҸҘ"жң¬еә—жүҖжңүз”ўе“Ғж”ҜжҸҙе…ЁзҗғйҖҒиІЁ". зӣ®зҡ„жҳҜиҰҒйҮқе°Қдәәзҡ„з—ӣй»һжҲ–жҢ‘иө·дәәзҡ„жғ…ж„ҹеҸҠиіјиІ·ж…ҫ, з«ӢеҚіеҺ»дёӢе–®иіјиІ·.',
long:'дҪ жҳҜдёҖеҖӢйӣ»е•Ҷе°Ҳе®¶, дҪ жҳҜе№«жҲ‘зҡ„з¶Іеә—(www.blissshop.life)е…§зҡ„з”ўе“Ғ , еҺ»еүөдҪңж–ҮжЎҲ, еңЁдёҚеҗҢзҡ„зӨҫдәӨе№іеҸ°дёҠзҷјиЎЁ. жҲ‘жңғжҠҠз”ўе“Ғзҡ„йҖЈзөҗзөҰдҪ , дҪ е№«жҲ‘еҸғиҖғд»ҘдёӢж–ҮжЎҲ, дҫҶеүөдҪңеҮә6йҒҚ(дёҚеҗҢе…§е®№йўЁж ј)и·ҹжҲ‘зөҰдҪ зҡ„з”ўе“Ғзҡ„д»Ӣзҙ№е…§е®№зөҰжҲ‘. иҰҒжҜ”еҹӢemojisжҜ”жҲ‘гҖӮ еҸҰеӨ–жҜҸеҖӢж–ҮжЎҲзҡ„зөҗе°ҫе№«жҲ‘еҠ дёҠдёҖеҸҘпјҡ жң¬еә—жүҖжңүз”ўе“Ғж”ҜжҸҙе…ЁзҗғйҖҒиІЁгҖӮ\n\nеҸғиҖғж–ҮжЎҲ:\nж—Ҙжң¬Scour Towels е»ҡжҲҝз’°дҝқдёҚз№”еёғжҠ№еёғ\nрҹ’ҜдёҖеҘ—6еҚ·рҹ’Ҝ\nжҝҖжҠөе‘ҖпҪһпҪһпҪһпҪһ\nж—Ҙжң¬еҺҹеғ№ $38/еҚ·\nдҫқе®¶ $6.5 /еҚ·пјҢеҘҪеҘҪз”Ёжһ¶пҪһ\nжңҖжҠөжңҖжҠөжңҖжҠө\n,и¶…и¶…и¶…жҠөе‘ҖрҹҲ№рҹҲ№рҹҲ№рҹҲ№рҹҲ№\nеӢҒеҘҪз”ЁжҺЁи–ҰвҖјпёҸеӮізөұжҠ№еёғжҪӣи—ҸеӨ§йҮҸзҙ°иҸҢпјҢжҜ”йҰ¬жЎ¶йӮ„й«’пјҢжңүе®іеҒҘеә·пјҢдёҚз№”еёғе…Қжҙ—ејҸеӨҡз”ЁжҠ№еёғпјҢд№ҫжҝ•е…©з”ЁпјҢй»һж–·ејҸиЁӯиЁҲгҖӮ\nдёҖж¬ЎжҖ§дҪҝз”ЁпјҢеҚіж’•еҚіз”ЁпјҢз”Ёе®ҢеҚіжү”пјҢзү№еҲҘж–№дҫҝгҖӮ\nе»ҡжҲҝжё…жҪ”гҖҒеӨ–еҮәйҮҺйӨҗйғҪеҸҜд»ҘдҪҝз”Ёе“ҰгҖӮ\nжҺЎз”Ёз«№зә–з¶ӯз„ЎзҙЎеёғпјҢдёҚеҗ«зҶ’е…үеҠ‘пјҢжҠ—иҸҢз„ЎжҜ’пјҢдёҚй»ҸжІ№пјҢеҺ»жұЎж•ҲжһңеҘҪпјҢжңүдёҖж“ҰеҚіж·Ёзҡ„еҠҹж•ҲгҖӮ\nвңҺе•Ҷе“Ғзү№иүІвңҺ\nрҹүҗз’°дҝқз„ЎзҙЎеёғжҠ№еёғ\nрҹүҗжҺЎз”ЁиЎӣз”ҹжё…жҪ”зҡ„дёҚз№”еёғ\nрҹүҗе…·жңүиЎӣз”ҹгҖҒжё…жҪ”гҖҒеҗёж°ҙжҖ§еј·гҖҒз„ЎжҜ’зҙ гҖҒжҹ”и»ҹиҖҗжҙ—гҖҒдёҚжҳ“з”ҹиҸҢпјҢ\nрҹүҗжңүдёҖж“ҰеҚіж·Ёзҡ„еҠҹж•Ҳе”·пјҒ\nвңҺе•Ҷе“ҒиҰҸж јвңҺдёҖеҘ—6 еҚ·\nв—Һе•Ҷе“ҒжқҗиіӘпјҡз„ЎзҙЎеёғ\nв—Һе•Ҷе“Ғе°әеҜёпјҡ50ејө (жҜҸзүҮ20x30cm)',
video:'дҪ жҳҜдёҖеҖӢyoutube short е№іеҸ°зҡ„з”ўе“ҒжҺЁе»Је°Ҳе®¶, йңҖиҰҒзөҰдҪ жҲ‘зҡ„з”ўе“ҒиіҮж–ҷ, дҪ з”Ёйқһеёёеҗёеј•зҡ„ж–№ејҸеҺ»з”ЁиӢұж–ҮеҜ«ж–ҮжЎҲеҮәдҫҶ, еҺ»еҗёеј•ж¶ҲжҒҜиҖ…жіЁж„ҸеҸҠиіјиІ·. еҗҢжҷӮиҰҒжҸҗдҫӣ\n1. еҗёеј•дәәзҡ„headling\n2. зӣёй–ўзҡ„hashtags\n3. зӣёй–ўзҡ„CHANNEL TAGS, з”Ё@й–Ӣй ӯ\n4. зӣёй–ўзҡ„tags, иҰҒз”Ё","еҺ»еҲҶй–Ӣ\n5. жҲ‘еҖ‘зҡ„з¶ІдёҠиҒҜзі»ж–№ејҸ: http://bit.ly/1FBLIVECHAT\n6. жҲ‘еҖ‘зҡ„web: blisstravel.life\nжҳҺзҷҪжҲ‘зҡ„иҰҒжұӮе—Һ?'
};
const TI={short:{n:'зҹӯж–ҮжЎҲ',f:'зҹӯж–ҮжЎҲ',d:'dot-short'},long:{n:'й•·ж–ҮжЎҲ',f:'й•·ж–ҮжЎҲ',d:'dot-long'},video:{n:'иҰ–й »ж–ҮжЎҲ',f:'иҰ–й »ж–ҮжЎҲ',d:'dot-video'}};

let history=[],currentResult=null,currentName='',activeTab='short';

function getKey(){return localStorage.getItem('ds_key')||'';}
function getModel(){return localStorage.getItem('ds_model')||'qwen-plus';}
function openSettings(){document.getElementById('apiKeyInput').value=getKey();document.getElementById('modelInput').value=getModel();document.getElementById('settingsModal').classList.add('show');}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function saveSettings(){localStorage.setItem('ds_key',document.getElementById('apiKeyInput').value.trim());localStorage.setItem('ds_model',document.getElementById('modelInput').value.trim());closeSettings();alert('е·ІдҝқеӯҳпјҒ');}
if(!getKey())setTimeout(openSettings,500);

function toggleTheme(){const b=document.body;t=b.getAttribute('data-theme');b.setAttribute('data-theme',t==='light'?'dark':'light');document.getElementById('iSun').style.display=t==='light'?'none':'block';document.getElementById('iMoon').style.display=t==='light'?'block':'none';}

async function callDS(sp,um){
  const k=getKey(),m=getModel();
  if(!k)throw new Error('и«Ӣе…ҲиЁӯе®ҡ API Key');
  const r=await fetch(DASHSCOPE_URL,{method:'POST',headers:{'Authorization':'Bearer '+k,'Content-Type':'application/json'},body:JSON.stringify({model:m,messages:[{role:'system',content:sp},{role:'user',content:um}]})});
  if(!r.ok){const e=await r.text();throw new Error('APIйҢҜиӘӨ('+r.status+'): '+e);}
  const d=await r.json();return d.choices[0].message.content;
}

async function generateAll(){
  const name=document.getElementById('productName').value.trim(),url=document.getElementById('productUrl').value.trim();
  const btn=document.getElementById('generateAllBtn'),st=document.getElementById('status');
  if(!name||!url){st.className='status show error';st.textContent='и«ӢеЎ«еҜ«з”ўе“ҒеҗҚзЁұе’Ң URL';return;}
  if(!getKey()){openSettings();return;}
  btn.disabled=true;st.className='status show loading';st.textContent='вҸі Qwen еҗҢжҷӮз”ҹжҲҗдёүзЁ®ж–ҮжЎҲдёӯ... йҖҡеёёйңҖиҰҒ 30-90 з§’';
  document.getElementById('resultCard').style.display='none';
  const um=url+' и¶…жҠөеғ№пјҢзҷҫе№ҫиҡҠе°ұеҸҜдҝӮBLISS SHOPе…ҘжүӢ вҖ” '+name;
  const types=['short','long','video'];
  const ps=types.map(t=>callDS(PROMPTS[t],um));
  const rs=await Promise.allSettled(ps);
  currentResult={};let ok=0;
  types.forEach((t,i)=>{if(rs[i].status==='fulfilled'){currentResult[t]={content:rs[i].value,error:false};ok++;}else{currentResult[t]={content:'вқҢ з”ҹжҲҗеӨұж•—: '+rs[i].reason.message,error:true};}});
  currentName=name;activeTab=types.find(t=>!currentResult[t].error)||'short';
  if(ok===3){st.className='status show success';st.textContent='вң… дёүзЁ®ж–ҮжЎҲе…ЁйғЁз”ҹжҲҗе®ҢжҲҗпјҒ';}
  else if(ok===0){st.className='status show error';st.textContent='вқҢ е…ЁйғЁз”ҹжҲҗеӨұж•—';}
  else{st.className='status show success';st.textContent='вҡ пёҸ '+ok+'/3 жҲҗеҠҹ';}
  renderResults(name);renderTabs();
  history.unshift({name,url,results:JSON.parse(JSON.stringify(currentResult)),time:new Date().toLocaleString('zh-HK')});
  renderHistory();btn.disabled=false;
}

async function continueOne(type){
  const st=document.getElementById('status'),info=TI[type];
  if(!currentResult||!currentResult[type]||currentResult[type].error)return;
  st.className='status show loading';st.textContent='вҸі з№јзәҢз”ҹжҲҗ'+info.n+'дёӯ...';
  try{const c=await callDS(PROMPTS[type],'з№јзәҢз”ҹжҲҗеү©йӨҳзҡ„ж–ҮжЎҲпјҢеҫһдёҠж¬Ўдёӯж–·зҡ„ең°ж–№жҺҘи‘—еҜ«гҖӮд»ҘдёӢжҳҜе·Із”ҹжҲҗзҡ„е…§е®№пјҡ\n\n'+currentResult[type].content);
  currentResult[type].content+='\n\n'+c;st.className='status show success';st.textContent='вң… '+info.n+'з№јзәҢз”ҹжҲҗе®ҢжҲҗпјҒ';renderSections();}
  catch(e){st.className='status show error';st.textContent='вқҢ '+e.message;}
}

function renderTabs(){const el=document.getElementById('resultTabs');el.innerHTML=Object.entries(TI).map(([k,i])=>'<div class="tab '+(k===activeTab?'active':'')+'" onclick="switchTab(\''+k+'\')"><span class="dot '+i.d+'"></span> '+i.n+(currentResult&&currentResult[k]?(currentResult[k].error?' вқҢ':' вң…'):'')+'</div>').join('');}
function switchTab(t){activeTab=t;renderTabs();renderSections();}
function renderResults(name){document.getElementById('resultCard').style.display='block';document.getElementById('resultTitle').textContent=name;renderSections();}
function renderSections(){const el=document.getElementById('resultSections');if(!currentResult)return;const info=TI[activeTab],data=currentResult[activeTab];
  el.innerHTML='<div><div class="rh"><div class="rt"><span class="dot '+info.d+'"></span> '+info.n+(data.error?' <span class="badge b-err">еӨұж•—</span>':' <span class="badge b-ok">е®ҢжҲҗ</span>')+'</div><div class="ra">'+(data.error?'':'<button class="btn btn-sec btn-sm" onclick="copyOne(\''+activeTab+'\')">рҹ“Ӣ иӨҮиЈҪ</button><button class="btn btn-sec btn-sm" onclick="continueOne(\''+activeTab+'\')">вҸӯпёҸ з№јзәҢ</button><button class="btn btn-sec btn-sm" onclick="downloadOne(\''+activeTab+'\')">рҹ’ҫ дёӢијү</button>')+'</div></div><div class="rc">'+esc(data.content)+'</div></div>';}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function copyOne(t){navigator.clipboard.writeText(currentResult[t].content);alert(TI[t].n+' е·ІиӨҮиЈҪпјҒ');}
function downloadOne(t){const info=TI[t],b=new Blob([currentResult[t].content],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=currentName+'_'+info.f+'.txt';a.click();}
function downloadAll(){Object.keys(TI).forEach(t=>{if(currentResult[t]&&!currentResult[t].error)downloadOne(t);});}

function renderHistory(){const el=document.getElementById('history');if(!history.length){el.innerHTML='<div class="empty">жҡ«з„ЎиЁҳйҢ„</div>';return;}
  el.innerHTML=history.map((h,i)=>{const ts=Object.keys(TI).filter(t=>h.results[t]&&!h.results[t].error);return '<div class="hi" onclick="showHistory('+i+')"><div class="name">'+h.name+' '+ts.length+'/3</div><div class="meta">'+h.time+' В· '+ts.map(t=>TI[t].n).join(' / ')+'</div><div class="pv">'+(h.results.short?h.results.short.content.substring(0,80):'...')+'...</div></div>';}).join('');}
function showHistory(i){const h=history[i];currentResult=JSON.parse(JSON.stringify(h.results));currentName=h.name;activeTab=Object.keys(TI).find(t=>h.results[t]&&!h.results[t].error)||'short';document.getElementById('productName').value=h.name;document.getElementById('productUrl').value=h.url;renderResults(h.name);renderTabs();window.scrollTo({top:0,behavior:'smooth'});}
renderHistory();
</script>
