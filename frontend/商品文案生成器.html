<!DOCTYPE html>
<html lang="zh-HK">
<head>

<title>BlissFlow — Copy Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========================================
   BlissFlow Design System v4 — i18n
   School: Warm Humanist (Stripe Press / Mailchimp early)
   ======================================== */

:root {
  --bg:          oklch(98.5% 0.004 40);
  --surface:     oklch(96.5% 0.006 40);
  --surface-2:   oklch(93% 0.008 40);
  --border:      oklch(88% 0.01 40);
  --border-hi:   oklch(82% 0.012 40);
  --text:        oklch(20% 0.012 40);
  --text-2:      oklch(42% 0.01 40);
  --text-3:      oklch(58% 0.008 40);
  --brand:       oklch(66% 0.14 35);
  --brand-hi:    oklch(72% 0.12 35);
  --brand-lo:    oklch(56% 0.13 35);
  --brand-bg:    oklch(94% 0.025 35);
  --ok:          oklch(52% 0.09 140);
  --ok-bg:       oklch(93% 0.02 140);
  --err:         oklch(56% 0.16 25);
  --err-bg:      oklch(93% 0.025 25);
  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px;
  --r-input: 4px; --r-btn: 6px; --r-card: 10px; --r-pill: 100px;
  --sh-sm: 0 1px 2px oklch(20% 0.01 40 / 0.04);
  --sh-md: 0 2px 8px oklch(20% 0.01 40 / 0.06), 0 1px 2px oklch(20% 0.01 40 / 0.04);
  --sh-lg: 0 8px 24px oklch(20% 0.01 40 / 0.08), 0 2px 6px oklch(20% 0.01 40 / 0.04);
  --ease: cubic-bezier(0.25, 1, 0.5, 1);
  --dur-1: 120ms; --dur-2: 280ms; --dur-3: 500ms;
}

[data-theme="dark"] {
  --bg: oklch(13% 0.006 40); --surface: oklch(17% 0.008 40); --surface-2: oklch(21% 0.01 40);
  --border: oklch(27% 0.01 40); --border-hi: oklch(33% 0.012 40);
  --text: oklch(93% 0.008 40); --text-2: oklch(72% 0.01 40); --text-3: oklch(52% 0.008 40);
  --brand: oklch(70% 0.12 35); --brand-hi: oklch(76% 0.1 35); --brand-lo: oklch(60% 0.12 35);
  --brand-bg: oklch(21% 0.035 35); --ok-bg: oklch(21% 0.03 140); --err-bg: oklch(21% 0.035 25);
  --sh-sm: 0 1px 2px oklch(0% 0 0 / 0.2);
  --sh-md: 0 2px 8px oklch(0% 0 0 / 0.25), 0 1px 2px oklch(0% 0 0 / 0.15);
  --sh-lg: 0 8px 24px oklch(0% 0 0 / 0.3), 0 2px 6px oklch(0% 0 0 / 0.2);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--text);
  font-size: 16px; line-height: 1.55;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  text-wrap: pretty;
  transition: background var(--dur-2) var(--ease), color var(--dur-2) var(--ease);
}
::selection { background: var(--brand); color: oklch(99% 0.005 40); }

.page { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--s-5); height: 60px;
  border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 0; z-index: 10;
}

.header-left { display: flex; align-items: center; gap: var(--s-4); }
.header-right { display: flex; align-items: center; gap: var(--s-2); }

.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 16px; height: 16px; border-radius: 3px; background: var(--brand); position: relative; }
.brand-mark::after { content: ''; position: absolute; inset: 3px; border-radius: 1px; background: var(--bg); }
.brand-name { font-family: var(--font-display); font-weight: 600; font-size: 19px; letter-spacing: -0.02em; font-style: italic; }

/* === Language Switcher === */
.lang-switch { display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--r-btn); overflow: hidden; }
.lang-btn {
  padding: 6px 11px; border: none; background: transparent;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--text-3); cursor: pointer;
  transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
}
.lang-btn:hover { background: var(--surface); color: var(--text-2); }
.lang-btn.active { background: var(--brand); color: oklch(99% 0.005 40); }

.theme-toggle {
  width: 38px; height: 38px;
  border: 1px solid var(--border); border-radius: var(--r-btn);
  background: var(--bg); color: var(--text-2);
  cursor: pointer; display: grid; place-items: center;
  transition: border-color var(--dur-2) var(--ease), color var(--dur-2) var(--ease);
}
.theme-toggle:hover { border-color: var(--text-3); color: var(--text); }
.theme-toggle:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

.main { flex: 1; max-width: 680px; width: 100%; margin: 0 auto; padding: var(--s-7) var(--s-5) var(--s-8); }

.hero-title { font-family: var(--font-display); font-size: clamp(34px, 5.5vw, 48px); font-weight: 600; font-style: italic; letter-spacing: -0.03em; line-height: 1.08; color: var(--text); }
.hero-title em { font-style: normal; font-weight: 400; color: var(--brand); }
.hero-lede { font-size: 17px; color: var(--text-2); margin-top: var(--s-3); max-width: 38ch; line-height: 1.5; }

.section-label { font-family: var(--font-body); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); margin-bottom: var(--s-3); }

.form-section { margin-top: var(--s-6); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); margin-bottom: var(--s-4); }
.field { display: flex; flex-direction: column; gap: var(--s-1); }
.field-label { font-size: 13px; font-weight: 500; color: var(--text-2); font-family: var(--font-body); }
.input {
  height: 46px; padding: 0 var(--s-3);
  border: 1px solid var(--border); border-radius: var(--r-input);
  background: var(--bg); color: var(--text);
  font-family: var(--font-body); font-size: 15px;
  transition: border-color var(--dur-2) var(--ease), box-shadow var(--dur-2) var(--ease);
}
.input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-bg); }
.input::placeholder { color: var(--text-3); }

.btn { height: 46px; padding: 0 var(--s-5); border: none; border-radius: var(--r-btn); font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity var(--dur-1) var(--ease), transform var(--dur-1) var(--ease), background var(--dur-1) var(--ease); display: inline-flex; align-items: center; gap: var(--s-2); justify-content: center; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-primary:hover { opacity: 0.85; }
.btn-cta { background: var(--brand); color: oklch(99% 0.005 40); width: 100%; height: 50px; font-size: 15px; font-weight: 700; box-shadow: var(--sh-sm); }
.btn-cta:hover { background: var(--brand-hi); }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); height: 34px; font-size: 13px; padding: 0 var(--s-3); border-radius: var(--r-btn); }
.btn-ghost:hover { background: var(--surface); color: var(--text); border-color: var(--border-hi); }
.btn-ghost:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

.status { padding: var(--s-3) var(--s-4); border-radius: var(--r-card); font-size: 14px; margin-top: var(--s-4); display: none; }
.status.show { display: block; animation: fadeUp var(--dur-2) var(--ease); }
.status.loading { background: var(--brand-bg); color: var(--brand-lo); }
.status.error { background: var(--err-bg); color: var(--err); }
.status.success { background: var(--ok-bg); color: var(--ok); }

.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: var(--s-5); }
.tab { padding: var(--s-3) var(--s-4); cursor: pointer; font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--text-3); border-bottom: 2px solid transparent; transition: color var(--dur-2) var(--ease), border-color var(--dur-2) var(--ease); margin-bottom: -1px; display: flex; align-items: center; gap: 7px; }
.tab:hover { color: var(--text-2); }
.tab.active { color: var(--text); border-bottom-color: var(--brand); font-weight: 600; }
.tab:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: var(--r-input); }

.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-short { background: oklch(60% 0.12 300); }
.dot-long  { background: oklch(65% 0.13 70); }
.dot-video { background: oklch(58% 0.13 250); }

.result-wrap { margin-top: var(--s-6); animation: fadeUp var(--dur-3) var(--ease); }
.result-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--s-4); }
.result-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: -0.02em; font-style: italic; }
.result-actions { display: flex; gap: var(--s-2); }
.result-body { margin-top: var(--s-3); }
.result-label { font-size: 13px; font-weight: 600; color: var(--text-2); display: flex; align-items: center; gap: 7px; margin-bottom: var(--s-2); }
.badge { font-size: 11px; padding: 2px 9px; border-radius: var(--r-pill); font-weight: 600; }
.b-ok  { background: var(--ok-bg); color: var(--ok); }
.b-err { background: var(--err-bg); color: var(--err); }
.result-content { white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.65; background: var(--surface); padding: var(--s-4); border-radius: var(--r-card); border: 1px solid var(--border); max-height: 460px; overflow-y: auto; font-variant-numeric: tabular-nums; }
.result-content:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
.result-tools { display: flex; gap: var(--s-2); margin-top: var(--s-3); }

.history-section { margin-top: var(--s-7); }
.history-list { margin-top: var(--s-3); }
.hi { cursor: pointer; padding: var(--s-3) 0; border-bottom: 1px solid var(--border); transition: padding-left var(--dur-2) var(--ease); }
.hi:last-child { border-bottom: none; }
.hi:hover { padding-left: var(--s-3); }
.hi-name { font-weight: 600; font-size: 14px; font-family: var(--font-body); display: flex; align-items: center; gap: 7px; }
.hi-count { font-size: 11px; font-weight: 600; background: var(--surface-2); color: var(--text-3); padding: 1px 7px; border-radius: var(--r-pill); }
.hi-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.hi-pv { font-size: 13px; color: var(--text-3); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-display); font-style: italic; }
.empty { text-align: center; color: var(--text-3); padding: var(--s-6) 0; font-size: 14px; }

.settings-link { margin-top: var(--s-3); text-align: center; }
.settings-link a { color: var(--text-3); font-size: 13px; cursor: pointer; transition: color var(--dur-2) var(--ease); text-decoration: none; }
.settings-link a:hover { color: var(--brand); }

.modal-bg { display: none; position: fixed; inset: 0; background: oklch(10% 0.005 40 / 0.4); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
.modal-bg.show { display: flex; animation: fadeIn var(--dur-2) var(--ease); }
.modal { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-card); padding: var(--s-5); width: 400px; max-width: calc(100vw - 32px); box-shadow: var(--sh-lg); animation: fadeUp var(--dur-2) var(--ease); }
.modal-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; font-style: italic; letter-spacing: -0.02em; margin-bottom: var(--s-1); }
.modal-desc { color: var(--text-3); font-size: 13px; margin-bottom: var(--s-5); }
.modal .field + .field { margin-top: var(--s-3); }
.modal-actions { display: flex; gap: var(--s-2); margin-top: var(--s-5); }

.footer { border-top: 1px solid var(--border); padding: var(--s-4) var(--s-5); text-align: center; font-size: 12px; color: var(--text-3); font-family: var(--font-display); font-style: italic; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

.result-content::-webkit-scrollbar { width: 6px; }
.result-content::-webkit-scrollbar-track { background: transparent; }
.result-content::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
.result-content::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

@media (max-width: 560px) {
  .form-row { grid-template-columns: 1fr; }
  .main { padding: var(--s-5) var(--s-4) var(--s-6); }
  .header { padding: 0 var(--s-4); }
  .lang-btn { padding: 5px 8px; font-size: 11px; }
}

@supports (padding: env(safe-area-inset-bottom)) { .footer { padding-bottom: max(var(--s-4), env(safe-area-inset-bottom)); } }
</style>
</head>
<body data-theme="light">

<div class="page">
  <header class="header">
    <div class="header-left">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <span class="brand-name">BlissFlow</span>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-switch" role="group" aria-label="Language">
        <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">繁中</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="ja" onclick="setLang('ja')">日本語</button>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg id="iSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M5 5l1.5 1.5M17.5 17.5L19 19M3 12h2M19 12h2M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>
        <svg id="iMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M20 12.5A8 8 0 1 1 11.5 4a6.5 6.5 0 0 0 8.5 8.5z"/></svg>
      </button>
    </div>
  </header>

  <main class="main">
    <h1 class="hero-title" data-i18n="heroTitle"></h1>
    <p class="hero-lede" data-i18n="heroLede"></p>

    <div class="form-section">
      <div class="section-label" data-i18n="productInfo"></div>
      <div class="form-row">
        <div class="field">
          <label class="field-label" for="productName" data-i18n="productName"></label>
          <input class="input" type="text" id="productName" data-i18n-ph="productNamePh" />
        </div>
        <div class="field">
          <label class="field-label" for="productUrl" data-i18n="productUrl"></label>
          <input class="input" type="text" id="productUrl" data-i18n-ph="productUrlPh" />
        </div>
      </div>
      <button class="btn btn-cta" id="genBtn" onclick="generateAll()" data-i18n="generateAll"></button>
      <div class="settings-link"><a onclick="openSettings()" data-i18n="settingsLink"></a></div>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <div id="resultWrap" class="result-wrap" style="display:none;">
      <div class="result-head">
        <span class="result-title" id="resultTitle"></span>
        <div class="result-actions">
          <button class="btn-ghost" onclick="downloadAll()" data-i18n="downloadAll"></button>
        </div>
      </div>
      <div class="tabs" id="tabs" role="tablist"></div>
      <div id="resultBody"></div>
    </div>

    <div class="history-section">
      <div class="section-label" data-i18n="history"></div>
      <div class="history-list" id="history"></div>
    </div>
  </main>

  <footer class="footer" data-i18n="footer"></footer>
</div>

<div class="modal-bg" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle" data-i18n="settingsTitle"></h2>
    <p class="modal-desc" data-i18n="settingsDesc"></p>
    <div class="field">
      <label class="field-label" for="apiKeyInput" data-i18n="apiKeyLabel"></label>
      <input class="input" type="password" id="apiKeyInput" placeholder="sk-..." />
    </div>
    <div class="field">
      <label class="field-label" for="modelInput" data-i18n="modelLabel"></label>
      <input class="input" type="text" id="modelInput" placeholder="qwen3.7-plus" value="qwen3.7-plus" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveSettings()" data-i18n="save"></button>
      <button class="btn-ghost" onclick="closeSettings()" data-i18n="cancel"></button>
    </div>
  </div>
</div>

// ========================================
// State
// ========================================
let LANG = localStorage.getItem('bf_lang') || 'zh';
let history=[], CR=null, CN='', AT='short';

const DASHSCOPE_URL='https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
const PROMPTS={
short:'你是一個電商專家. 這是你經營的國際電商獨立站 www.blissshop.life , 我會比不同的產品名稱及連結比你, 你分別用地道的廣東話, 日文, 及英文, 用20種不同表達方式(就是給我創作20個文案), 每個表達只有2-6句就可以, 每句需要加上emojis及這句"本店所有產品支援全球送貨". 目的是要針對人的痛點或挑起人的情感及購買慾, 立即去下單購買.',
long:'你是一個電商專家, 你是幫我的網店(www.blissshop.life)內的產品 , 去創作文案, 在不同的社交平台上發表. 我會把產品的連結給你, 你幫我參考以下文案, 來創作出6遍(不同內容風格)跟我給你的產品的介紹內容給我. 要比埋emojis比我。 另外每個文案的結尾幫我加上一句： 本店所有產品支援全球送貨。\n\n參考文案:\n日本Scour Towels 廚房環保不織布抹布\n💯一套6卷💯\n激抵呀～～～～\n日本原價 $38/卷\n依家 $6.5 /卷，好好用架～\n最抵最抵最抵\n,超超超抵呀🈹🈹🈹🈹🈹\n勁好用推薦‼️傳統抹布潛藏大量細菌，比馬桶還髒，有害健康，不織布免洗式多用抹布，乾濕兩用，點斷式設計。\n一次性使用，即撕即用，用完即扔，特別方便。\n廚房清潔、外出野餐都可以使用哦。\n採用竹纖維無紡布，不含熒光劑，抗菌無毒，不黏油，去污效果好，有一擦即淨的功效。\n✎商品特色✎\n🉐環保無紡布抹布\n🉐採用衛生清潔的不織布\n🉐具有衛生、清潔、吸水性強、無毒素、柔軟耐洗、不易生菌，\n🉐有一擦即淨的功效唷！\n✎商品規格✎一套6 卷\n◎商品材質：無紡布\n◎商品尺寸：50張 (每片20x30cm)',
video:'你是一個youtube short 平台的產品推廣專家, 需要給你我的產品資料, 你用非常吸引的方式去用英文寫文案出來, 去吸引消息者注意及購買. 同時要提供\n1. 吸引人的headling\n2. 相関的hashtags\n3. 相関的CHANNEL TAGS, 用@開頭\n4. 相関的tags, 要用","去分開\n5. 我們的網上聯系方式: http://bit.ly/1FBLIVECHAT\n6. 我們的web: blisstravel.life\n明白我的要求嗎?'
};

// ========================================
// i18n helpers
// ========================================
function t(key){const v=I18N[LANG][key];return typeof v==='function'?v:v;}
function tFn(key,...args){const fn=I18N[LANG][key];return typeof fn==='function'?fn(...args):fn;}

function getTabInfo(){
  return {
    short:{n:t('tabShort'),f:t('fileShort'),d:'dot-short'},
    long:{n:t('tabLong'),f:t('fileLong'),d:'dot-long'},
    video:{n:t('tabVideo'),f:t('fileVideo'),d:'dot-video'}
  };
}

function applyI18n(){
  document.documentElement.lang = LANG==='zh'?'zh-HK':LANG==='ja'?'ja':'en';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    const val=I18N[LANG][key];
    if(val!==undefined){
      if(key==='heroTitle'){el.innerHTML=val;}
      else{el.textContent=val;}
    }
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const key=el.getAttribute('data-i18n-ph');
    el.placeholder=I18N[LANG][key]||'';
  });
  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang===LANG);
  });
  // Re-render dynamic content
  if(CR){renderTabs();renderBody();}
  renderHistory();
}

function setLang(lang){
  LANG=lang;
  localStorage.setItem('bf_lang',lang);
  applyI18n();
}

// ========================================
// Core functions
// ========================================
function getKey(){return localStorage.getItem('ds_key')||'';}
function getModel(){return localStorage.getItem('ds_model')||'qwen3.7-plus';}
function openSettings(){document.getElementById('apiKeyInput').value=getKey();document.getElementById('modelInput').value=getModel();document.getElementById('settingsModal').classList.add('show');}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function saveSettings(){localStorage.setItem('ds_key',document.getElementById('apiKeyInput').value.trim());localStorage.setItem('ds_model',document.getElementById('modelInput').value.trim());closeSettings();}
if(!getKey())setTimeout(openSettings,600);

function toggleTheme(){const b=document.body;t2=b.getAttribute('data-theme');b.setAttribute('data-theme',t2==='light'?'dark':'light');document.getElementById('iSun').style.display=t2==='light'?'none':'block';document.getElementById('iMoon').style.display=t2==='light'?'block':'none';}

async function callDS(sp,um){
  const k=getKey(),m=getModel();
  if(!k)throw new Error(t('errApiKey'));
  const r=await fetch(DASHSCOPE_URL,{method:'POST',headers:{'Authorization':'Bearer '+k,'Content-Type':'application/json'},body:JSON.stringify({model:m,messages:[{role:'system',content:sp},{role:'user',content:um}]})});
  if(!r.ok){const e=await r.text();throw new Error('API Error ('+r.status+'): '+e);}
  const d=await r.json();return d.choices[0].message.content;
}

async function generateAll(){
  const name=document.getElementById('productName').value.trim(),url=document.getElementById('productUrl').value.trim();
  const btn=document.getElementById('genBtn'),st=document.getElementById('status');
  if(!name||!url){st.className='status show error';st.textContent=t('errFillForm');return;}
  if(!getKey()){openSettings();return;}
  btn.disabled=true;st.className='status show loading';st.textContent=t('loadingGen');
  document.getElementById('resultWrap').style.display='none';
  const um=tFn('userMsg',url,name);
  const types=['short','long','video'];
  const rs=await Promise.allSettled(types.map(tp=>callDS(PROMPTS[tp],um)));
  CR={};let ok=0;
  types.forEach((tp,i)=>{if(rs[i].status==='fulfilled'){CR[tp]={c:rs[i].value,e:false};ok++;}else{CR[tp]={c:'Error: '+rs[i].reason.message,e:true};}});
  CN=name;AT=types.find(tp=>!CR[tp].e)||'short';
  if(ok===3){st.className='status show success';st.textContent=t('allSuccess');}
  else if(ok===0){st.className='status show error';st.textContent=t('allFail');}
  else{st.className='status show success';st.textContent=tFn('partialSuccess',ok,3-ok);}
  renderResult(name);renderTabs();
  history.unshift({name,url,results:JSON.parse(JSON.stringify(CR)),time:new Date().toLocaleString(LANG==='zh'?'zh-HK':LANG==='ja'?'ja-JP':'en-US')});
  renderHistory();btn.disabled=false;
}

async function continueOne(type){
  const TI=getTabInfo();
  const st=document.getElementById('status'),info=TI[type];
  if(!CR||!CR[type]||CR[type].e)return;
  st.className='status show loading';st.textContent=tFn('loadingContinue',info.n);
  try{const c=await callDS(PROMPTS[type],'繼續生成剩餘的文案，從上次中斷的地方接著寫。以下是已生成的內容：\n\n'+CR[type].c);
  CR[type].c+='\n\n'+c;st.className='status show success';st.textContent=tFn('continueSuccess',info.n);renderBody();}
  catch(e){st.className='status show error';st.textContent=e.message;}
}

function renderTabs(){
  const TI=getTabInfo();
  document.getElementById('tabs').innerHTML=Object.entries(TI).map(([k,i])=>`<div class="tab ${k===AT?'active':''}" onclick="switchTab('${k}')" role="tab" tabindex="${k===AT?0:-1}"><span class="dot ${i.d}"></span>${i.n}${CR&&CR[k]?(CR[k].e?' ✕':' ✓'):''}</div>`).join('');
}
function switchTab(tp){AT=tp;renderTabs();renderBody();}
function renderResult(name){document.getElementById('resultWrap').style.display='block';document.getElementById('resultTitle').textContent=name;renderBody();}
function renderBody(){
  const TI=getTabInfo();
  const info=TI[AT],data=CR[AT],el=document.getElementById('resultBody');
  el.innerHTML=`<div class="result-body"><div class="result-label"><span class="dot ${info.d}"></span>${info.n}${data.e?` <span class="badge b-err">${t('badgeFail')}</span>`:` <span class="badge b-ok">${t('badgeDone')}</span>`}</div><div class="result-content" tabindex="0">${esc(data.c)}</div>${data.e?'':`<div class="result-tools"><button class="btn-ghost" onclick="copyOne('${AT}')">${t('btnCopy')}</button><button class="btn-ghost" onclick="continueOne('${AT}')">${t('btnContinue')}</button><button class="btn-ghost" onclick="downloadOne('${AT}')">${t('btnDownload')}</button></div>`}</div>`;
}
function esc(txt){const d=document.createElement('div');d.textContent=txt;return d.innerHTML;}
function copyOne(tp){const TI=getTabInfo();navigator.clipboard.writeText(CR[tp].c);alert(tFn('copied',TI[tp].n));}
function downloadOne(tp){const TI=getTabInfo();const b=new Blob([CR[tp].c],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=CN+'_'+TI[tp].f+'.txt';a.click();}
function downloadAll(){Object.keys(getTabInfo()).forEach(tp=>{if(CR[tp]&&!CR[tp].e)downloadOne(tp);});}

function renderHistory(){
  const TI=getTabInfo();
  const el=document.getElementById('history');
  if(!history.length){el.innerHTML=`<div class="empty">${t('empty')}</div>`;return;}
  el.innerHTML=history.map((h,i)=>{
    const ts=Object.keys(TI).filter(tp=>h.results[tp]&&!h.results[tp].e);
    return `<div class="hi" onclick="showHistory(${i})"><div class="hi-name">${h.name}<span class="hi-count">${ts.length}/3</span></div><div class="hi-meta">${h.time} · ${ts.map(tp=>TI[tp].n).join(' / ')}</div><div class="hi-pv">${(h.results.short?h.results.short.c.substring(0,80):'…')}…</div></div>`;
  }).join('');
}
function showHistory(i){const h=history[i];const TI=getTabInfo();CR=JSON.parse(JSON.stringify(h.results));CN=h.name;AT=Object.keys(TI).find(tp=>h.results[tp]&&!h.results[tp].e)||'short';document.getElementById('productName').value=h.name;document.getElementById('productUrl').value=h.url;renderResult(h.name);renderTabs();window.scrollTo({top:0,behavior:'smooth'});}

// ========================================
// Init
// ========================================
applyI18n();
</script>
